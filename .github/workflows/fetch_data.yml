name: Fetch parking data

on:
  schedule:
    # Cada 5 minutos (mínimo permitido por GitHub Actions)
    - cron: '*/5 * * * *'
  workflow_dispatch:   # Permite lanzarlo manualmente desde la web de GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8   # ampliado para dar margen al entrenamiento si hay cache miss

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      # ── Caché del modelo ────────────────────────────────────────────────────
      # El modelo se reentrena una vez al día (clave = fecha actual).
      # Así el modelo aprende de los datos reales acumulados en Supabase
      # (parking_estado) sin reentrenar en cada ciclo de 5 min.
      # Si durante el día ya existe la caché, se reutiliza el modelo.
      - name: Obtener fecha actual para clave de caché
        id: fecha
        run: echo "hoy=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Cache modelo Random Forest
        id: cache-modelo
        uses: actions/cache@v4
        with:
          path: python/modelo/model.pkl
          key: modelo-rf-${{ steps.fecha.outputs.hoy }}

      - name: Entrenar modelo (una vez al día con datos reales de Supabase)
        if: steps.cache-modelo.outputs.cache-hit != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Cache miss — entrenando modelo con datos reales de Supabase..."
          python python/modelo/train.py --horizonte 1
          echo "Modelo entrenado y guardado en python/modelo/model.pkl"

      - name: Confirmar modelo listo
        run: |
          if [ -f python/modelo/model.pkl ]; then
            echo "✅ Modelo disponible ($(du -sh python/modelo/model.pkl | cut -f1))"
          else
            echo "⚠️ Modelo no encontrado — las predicciones usarán patrones de fallback"
          fi

      # ── Ingesta y predicciones ──────────────────────────────────────────────
      - name: Run ingesta + predicciones
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python python/main.py --once

      - name: Upload estado_actual.json como artefacto (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: estado-actual
          path: data/processed/estado_actual.json
          retention-days: 1
